  <script>
    function sendHeight() {
      const h = Math.max(
        document.body ? document.body.scrollHeight : 0,
        document.documentElement ? document.documentElement.scrollHeight : 0
      );
      if (window.parent !== window) {
        window.parent.postMessage({ type: "resize", height: h }, "*");
      }
    }
    function sendHeightSoon() {
      requestAnimationFrame(() => {
        sendHeight();
        setTimeout(sendHeight, 150);
        setTimeout(sendHeight, 600);
      });
    }
    window.addEventListener("load", sendHeightSoon);
    window.addEventListener("resize", sendHeightSoon);
  </script>

    function normalizeSize(s) { return String(s || "").trim(); }
    function getKey(path, taille) { return `${path}|${normalizeSize(taille)}`; }

    function stockLabelFor(key) {
      const raw = STOCK_MAP[key];

      // stock non renseigné => on n'affiche rien
      if (raw === undefined || raw === null || String(raw).trim() === "") return "";

      const v = Number(String(raw).replace(",", "."));
      if (!Number.isFinite(v)) return "";

      // rupture si 0 ou négatif, en stock si 1+
      return (v >= 1) ? "✅ En stock" : "⚠️ Rupture";
    }

    function getSizeOptions(cat, file) {

      return CAT_SIZES[cat] || ["Standard"];
    }

    function getStoredSize(key, fallback) {
      try {
        const v = localStorage.getItem("size:" + key);
        return v ? v : fallback;
      } catch { return fallback; }
    }
    function setStoredSize(key, val) {
      try { localStorage.setItem("size:" + key, val); } catch { }
    }

    function pickInitialSize(pathKey, options) {
      const stored = getStoredSize(pathKey, "");
      if (stored && options.includes(stored)) {
        const ks = getKey(pathKey, stored);
        const vs = Number(STOCK_MAP[ks]);
        if (vs > 0) return stored;
      }
      for (const opt of options) {
        const k = getKey(pathKey, opt);
        const v = Number(STOCK_MAP[k]);
        if (v > 0) return opt;
      }
      return options[0] || "";
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status} sur ${url}`);
      return res.json();
    }

    async function fetchXlsxAsPriceMap(xlsxUrl) {
      const res = await fetch(xlsxUrl, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status} sur ${xlsxUrl}`);

      const buf = await res.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      if (!ws) throw new Error(`Feuille Excel introuvable dans ${xlsxUrl}`);

      const rows = XLSX.utils.sheet_to_json(ws, { defval: "", raw: false });

      const map = Object.create(null);
      const stock = Object.create(null);

      for (const r of rows) {
        let path = String(r.path || r.Path || r.PATH || "").trim();
        const taille = normalizeSize(r.taille ?? r.Taille ?? r.TAILLE ?? "");
        let price = r.prix_tvac ?? r.Prix_TVAC ?? r.PRIX_TVAC ?? r.prix ?? r.Prix ?? "";
        let stockRaw = r.disponible ?? r.Disponible ?? r.DISPO ?? r.dispo ?? r.stock ?? r.Stock ?? "";

        let stockVal = undefined;
        const stockStr = String(stockRaw).trim();
        if (stockStr !== "") {
          const n = Number(stockStr.replace(",", "."));
          if (Number.isFinite(n)) stockVal = n;
        }

        if (!path) continue;
        path = path.replaceAll("\\", "/").replace(/^\.?\//, "");

        if (typeof price === "string") price = price.replace(",", ".").trim();
        const num = Number(price);

        const k = getKey(path, taille);

        if (stockVal !== undefined) stock[k] = stockVal;

        if (Number.isFinite(num)) {
          map[k] = num;
        }
      }
      return { map, stock };
    }

    function buildSizesByPath(priceMap) {
      const idx = Object.create(null);
      for (const k of Object.keys(priceMap)) {
        const sep = k.indexOf("|");
        if (sep === -1) continue;
        const pathKey = k.slice(0, sep);
        const taille = normalizeSize(k.slice(sep + 1));
        if (!pathKey || !taille) continue;
        if (/\.(png|jpg|jpeg|webp)$/i.test(taille)) continue;
        (idx[pathKey] ||= []).push(taille);
      }
      const collator = new Intl.Collator("fr", { numeric: true, sensitivity: "base" });
      for (const p of Object.keys(idx)) {
        idx[p] = Array.from(new Set(idx[p])).sort((a, b) => collator.compare(String(a), String(b)));
      }
      return idx;
    }

            const key = getKey(pathKey, s);
            const base = (cat === "grohe") ? 119.9 : (cat === "paffoni") ? 89.9 : 59.9;
            const price = base + (i * 12.5);
            PRICE_MAP[key] = Math.round(price * 100) / 100;
            STOCK_MAP[key] = (i === 0) ? 8 : (i === 1 ? 0 : 3);
          });
        }
      }
      SIZES_BY_PATH = buildSizesByPath(PRICE_MAP);
    }

    async function loadPricesFromFolder() {
      try {
        const { map, stock } = await fetchXlsxAsPriceMap("prix/prix.xlsx");
        PRICE_MAP = map;
        STOCK_MAP = stock;
        SIZES_BY_PATH = buildSizesByPath(PRICE_MAP);
      } catch (e) {
        console.warn("Aucun fichier prix trouvé ou erreur lecture :", e);
        PRICE_MAP = Object.create(null);
        STOCK_MAP = Object.create(null);
        SIZES_BY_PATH = Object.create(null);
      }
    }

    function formatPrice(v) {
      if (!Number.isFinite(v)) return "";
      return (Math.round(v * 100) / 100).toFixed(2);
    }

    const categories = CATEGORY_UI.filter(c => IMAGES[c.id]);
    let activeCat = categories[0]?.id || "__none__"; // ✅ Schütte sera actif par défaut

    function buildCatButtons() {
      const catById = Object.fromEntries(categories.map(c => [c.id, c]));
      const mkBtn = (c) => {
        const icon = CAT_ICONS[c.id];
        return `
          <button class="catBtn ${c.id === activeCat ? 'active' : ''}" data-cat="${c.id}" type="button">
            ${icon ? `<div class="catIcon"><img src="${icon}" alt=""></div>` : ``}
            <span>${c.label}</span>
          </button>
        `;
      };

      catButtons.innerHTML = CAT_GROUPS.map(g => {
        const list = g.cats.map(id => catById[id]).filter(Boolean);
        if (!list.length) return "";
        return `
          <div class="catGroup" data-group="${g.id}">
            <div class="catGroupTitle">${g.label}</div>
            <div class="catGroupRow">
              ${list.map(mkBtn).join("")}
            </div>
          </div>
        `;
      }).join("");

      catButtons.querySelectorAll("button[data-cat]").forEach(btn => {
        btn.addEventListener("click", () => {
          activeCat = btn.dataset.cat;

          buildSubCatButtons();
          syncCategoryUI();
          render();
        });
      });
    }

    function buildCatSelect() {
      const catById = Object.fromEntries(categories.map(c => [c.id, c]));
      catSelect.innerHTML = CAT_GROUPS.map(g => {
        const list = g.cats.map(id => catById[id]).filter(Boolean);
        if (!list.length) return "";
        return `
          <optgroup label="${g.label}">
            ${list.map(c => `<option value="${c.id}">${c.label}</option>`).join("")}
          </optgroup>
        `;
      }).join("");

      catSelect.addEventListener("change", () => {
        activeCat = catSelect.value;

        buildSubCatButtons();
        syncCategoryUI();
        render();
      });
    }

    function syncCategoryUI() {
      if (catSelect) catSelect.value = activeCat;
      document.querySelectorAll("#catButtons .catBtn").forEach(b => {
        b.classList.toggle("active", b.dataset.cat === activeCat);
      });
    }

    function render() {
      const cat = activeCat;
      const files = IMAGES[cat] || [];

      let html = `<div class="grid">`;

      for (const f of files) {
        const pathKey = `${cat}/${f}`;
        const isPlaceholder = String(f).startsWith("__placeholder");
        const src = isPlaceholder ? PLACEHOLDER_SRC : `${cat}/${encodeURIComponent(f)}`;

        // ✅ clé exactement identique : "schutte/xxxx.png"
        const fallbackLabel = (isPlaceholder ? "Produit (à renseigner)" : f)
          .replace(/\.(png|jpg|jpeg|webp)$/i, "")
          .replace(/[-_]/g, " ");

        const label = (DISPLAY_NAMES[pathKey] ?? fallbackLabel);
        const sub = PRODUCT_SUBCAT[pathKey] ?? null;
        if (activeSubCategory && sub !== activeSubCategory) continue;

        const currentSize = "";

        const k = getKey(pathKey, currentSize);
        const price = PRICE_MAP[k];
        const stockText = stockLabelFor(k);

        const stockId = "st_" + btoa(pathKey).replace(/=+/g, '');

        const priceSection = (price !== undefined)
          ? (() => {
            const s = formatPrice(price);
            const [intPart, decPart = "00"] = s.split(".");
            return `
        <div class="price">
          <div class="price-label">Tvac</div>
          <div class="price-amount">
            <span class="int">${intPart}</span>
            <span class="dec">${decPart}</span>
            <span class="eur">€</span>
          </div>
        </div>
      `;
          })()
          : "";

        html += `
          <figure>
            <figcaption>
             <a href="#" class="titleLink openDesc" data-desc-key="${pathKey}">${label}</a>
            </figcaption>

            <a href="#" class="thumb openDesc" data-desc-key="${pathKey}">
              <img src="${src}" alt="${label}">
            </a>

            <div class="stock" id="${stockId}">${stockText}</div>

            ${priceSection}
          </figure>
        `;
      }

      html += `</div>`;
      app.innerHTML = html;

      sendHeightSoon();

    }

    // ======================
    // Modal descriptif
    // ======================
    const descModal = document.getElementById("descModal");
    const descTitle = document.getElementById("descTitle");
    const descBody = document.getElementById("descBody");

    function openDescByKey(key) {
      if (!descModal || !descTitle || !descBody) return;

      const title = DISPLAY_NAMES[key]
        ?? String(key).split("/").pop().replace(/\.(png|jpg|jpeg|webp)$/i, "").replace(/[-_]/g, " ");

      // 🔥 image en grand (même logique que render)
      const file = String(key).split("/").pop();
      const src = String(file).startsWith("__placeholder")
        ? PLACEHOLDER_SRC
        : `${String(key).split("/")[0]}/${encodeURIComponent(file)}`;

      const items = DESCRIPTIFS[key] || [];

      descTitle.textContent = title;

      // ✅ Image + descriptif (si dispo)
      descBody.innerHTML = `
    <div class="modalImage">
      <img src="${src}" alt="${title}">
    </div>
    ${items.length ? `<ul>${items.map(t => `<li>${String(t)}</li>`).join("")}</ul>` : ""}
  `;

      descModal.setAttribute("aria-hidden", "false");
    }

    function closeDesc() {
      if (!descModal) return;
      descModal.setAttribute("aria-hidden", "true");
    }

    // Click (délégation) : titre ou photo
    document.addEventListener("click", (e) => {
      const opener = e.target.closest(".openDesc");
      if (opener) {
        e.preventDefault();
        const key = opener.getAttribute("data-desc-key");
        if (key) openDescByKey(key);
        return;
      }

      // Fermeture
      const closeBtn = e.target.closest("[data-close='1']");
      if (closeBtn) {
        e.preventDefault();
        closeDesc();
      }
    });

    // Touche ESC pour fermer
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeDesc();
    });

    (async function init() {
      try {
        await loadPricesFromFolder(); // si manifest absent => OK
        seedDemoDataIfEmpty();        // ✅ prérempli (prix/stock) si rien n’a été chargé
        buildCatButtons();
        buildCatSelect();
        buildSubCatButtons();
        syncCategoryUI();
        render();
      } catch (e) {
        console.error("Init error:", e);
        app.innerHTML = `<p class="missing">❌ Erreur JavaScript: ${String(e && e.message ? e.message : e)}</p>`;
      }
    })();

  </script>
</body>

</html>
